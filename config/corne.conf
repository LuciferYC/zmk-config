# Uncomment the following lines to enable the Corne RGB Underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_EFFECTS=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y
CONFIG_ZMK_RGB_UNDERGLOW_HUE_STEP=10
CONFIG_ZMK_RGB_UNDERGLOW_SAT_STEP=5
CONFIG_ZMK_RGB_UNDERGLOW_BRI_STEP=5
CONFIG_WS2812_STRIP=y

# Uncomment the following line to enable the Lily58 OLED Display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BATTERY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_LAYER=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_WORDS=y
CONFIG_SSD1306=y

# Allow higher TX power of nRF52840 chip for nice!nano
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Configure ability to sleep
CONFIG_ZMK_SLEEP=n

# Bluetooth configs
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=y
CONFIG_ZMK_HID_REPORT_IDLE_TIMEOUT=0

# NKRO
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y

# 电池检测
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_VOLTAGE=y
